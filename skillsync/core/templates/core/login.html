{% extends "core/base.html" %}

{% block title %}Login - SkillSync{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-panel glass-panel">
        <div class="auth-heading">
            <span class="eyebrow">Welcome back</span>
            <h1>Login to SkillSync</h1>
            <p>Continue to your role-based dashboard and AI workspace.</p>
        </div>

        <form method="POST" data-loading>
            {% csrf_token %}
            <div class="form-floating mb-3">
                <input class="form-control" type="text" name="username" id="username" placeholder="Username" required>
                <label for="username">Username</label>
            </div>
            <div class="form-floating mb-4">
                <input class="form-control" type="password" name="password" id="password" placeholder="Password" required>
                <label for="password">Password</label>
            </div>
            <button class="btn btn-primary w-100 btn-lg" type="submit">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>

        <div class="auth-switch">
            New here?
            <a href="{% url 'signup' 'client' %}">Client signup</a>
            <span>or</span>
            <a href="{% url 'signup' 'freelancer' %}">Freelancer signup</a>
        </div>
    </div>
</section>
{% endblock %}
