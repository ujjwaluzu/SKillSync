<!DOCTYPE html>
<html>
<head>
    <title>Freelancer Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f5f7fa;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .desc {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .price {
            font-weight: 600;
            color: #4facfe;
            margin-bottom: 15px;
        }

        form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        input[type="text"] {
            flex: 1;
        }

        input[type="number"] {
            width: 120px;
        }

        button {
            padding: 10px 15px;
            background: #00c896;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #009f75;
        }

        .empty {
            text-align: center;
            color: #777;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Freelancer Dashboard 💼</h1>

    {% for p in projects %}
        <div class="card">

            <div class="desc">
                {{ p.description }}
            </div>

            <div class="price">
                💰 ₹{{ p.min_price }} – ₹{{ p.max_price }}
            </div>

            <form method="POST" action="/bid-form/{{ p.id }}/">
                {% csrf_token %}
                <input type="text" name="freelancer" placeholder="Your name">
                <input type="number" name="amount" placeholder="Your bid">
                <button type="submit">Place Bid</button>
            </form>

        </div>

    {% empty %}
        <p class="empty">No projects available right now.</p>
    {% endfor %}

</div>

</body>
</html>
