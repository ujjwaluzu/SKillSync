<!DOCTYPE html>
<html>
<head>
    <title>Signup - SkillSync</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 14px;
            width: 320px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 5px;
        }

        .role {
            font-size: 13px;
            color: #777;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #00c896;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00c896;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #009f75;
        }

        .link {
            margin-top: 15px;
            font-size: 14px;
        }

        .link a {
            text-decoration: none;
            color: #00c896;
            font-weight: 500;
        }

        .link a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Signup</h2>
    <div class="role">as {{ role|title }}</div>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Create Account</button>
    </form>

    <div class="link">
        Already have an account? <a href="/login/">Login</a>
    </div>

</div>

</body>
</html>
